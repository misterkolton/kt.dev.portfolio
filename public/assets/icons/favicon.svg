<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="KT logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19162d" />
      <stop offset="0.6" stop-color="#111226" />
      <stop offset="1" stop-color="#221941" />
    </linearGradient>
    <linearGradient id="stripe1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9a68d6" />
      <stop offset="1" stop-color="#a873e2" />
    </linearGradient>
    <linearGradient id="stripe2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8458c9" />
      <stop offset="1" stop-color="#8c63cf" />
    </linearGradient>
    <linearGradient id="stripe3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#704aba" />
      <stop offset="1" stop-color="#7b55c2" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="128" cy="128" r="126" />
    </clipPath>
  </defs>

  <circle cx="128" cy="128" r="126" fill="url(#bg)" stroke="#0c0b14" stroke-width="2" />

  <g clip-path="url(#circleClip)">
    <rect x="0" y="149" width="256" height="23" fill="url(#stripe1)" />
    <rect x="0" y="173" width="256" height="20" fill="url(#stripe2)" />
    <rect x="0" y="194" width="256" height="22" fill="url(#stripe3)" />
  </g>

  <text
    x="128"
    y="143"
    text-anchor="middle"
    font-family="Arial Black, Impact, system-ui, sans-serif"
    font-size="122"
    font-weight="900"
    letter-spacing="4"
    fill="#f2e8ce"
  >KT</text>
</svg>
